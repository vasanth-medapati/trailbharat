<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>TrailBharat | Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #09100a; --bg2: #0f180f; --g: #4ade80; --r: #ef4444; --t1: #e8f5e9; --t3: #4d7060; --b1: rgba(74, 222, 128, .11); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--t1); font-family: 'DM Sans', sans-serif; overflow: hidden; height: 100vh; }
        
        /* Your Original GUI Style */
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 9000; height: 52px; background: rgba(9, 16, 10, .96); backdrop-filter: blur(18px); border-bottom: 1px solid var(--b1); display: flex; align-items: center; padding: 0 12px; gap: 6px; }
        .nb { font-family: 'Syne'; font-size: 18px; font-weight: 800; color: var(--g); letter-spacing: -1px; }
        .ntabs { display: flex; gap: 4px; overflow-x: auto; flex: 1; scrollbar-width: none; }
        .nt { background: none; border: none; color: var(--t3); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 7px; cursor: pointer; white-space: nowrap; transition: .2s; }
        .nt.on { color: var(--g); background: rgba(74, 222, 128, .1); }
        .nsos { background: var(--r); border: none; color: #fff; border-radius: 8px; padding: 5px 12px; font-weight: 700; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }

        .pg { display: none; height: 100vh; padding-top: 52px; position: relative; }
        .pg.on { display: block; }
        
        /* Map UI */
        #map, #map3d { height: 100%; width: 100%; position: absolute; top: 0; }
        #map3d { display: none; z-index: 10; }
        
        .msbar { position: absolute; top: 66px; left: 10px; right: 56px; z-index: 800; }
        .msbar input { width: 100%; background: rgba(9, 16, 10, .92); border: 1px solid var(--b1); border-radius: 10px; padding: 10px 15px; color: #fff; outline: none; }
        .mres { position: absolute; top: 115px; left: 10px; right: 56px; background: var(--bg2); border: 1px solid var(--b1); border-radius: 10px; display: none; z-index: 800; max-height: 200px; overflow-y: auto; }
        .mres-item { padding: 12px; border-bottom: 1px solid var(--b1); cursor: pointer; font-size: 13px; }

        .mctrl { position: absolute; top: 66px; right: 10px; z-index: 800; display: flex; flex-direction: column; gap: 6px; }
        .mb { width: 36px; height: 36px; background: rgba(9,16,10,.92); border: 1px solid var(--b1); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--t2); }
        
        /* Login Modal */
        #authModal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-box { background: var(--bg2); border: 1px solid var(--b1); padding: 25px; border-radius: 15px; width: 100%; max-width: 320px; }
    </style>
</head>
<body>

<nav>
    <div class="nb">🏔 TB</div>
    <div class="ntabs">
        <button class="nt on" onclick="gp('home')">🏠 Home</button>
        <button class="nt" id="btn2d" onclick="gp('map'); switchMode('2d')">🗺 Map</button>
        <button class="nt" id="btn3d" onclick="gp('map'); switchMode('3d')">🏔 3D View</button>
        <button class="nt" onclick="toggleSafety()">🛡 Safety</button>
        <button class="nt" id="authBtn" onclick="openAuth()">🔑 Login</button>
    </div>
    <button class="nsos" onclick="triggerSOS()">🆘 SOS</button>
</nav>

<div id="pg-home" class="pg on">
    <div style="padding: 100px 20px; text-align: center;">
        <h1 style="font-family: 'Syne'; font-size: 32px; color: var(--g);">TrailBharat</h1>
        <p style="color: var(--t3); margin-top: 10px;">India's Pro 3D Navigator</p>
    </div>
</div>

<div id="pg-map" class="pg">
    <div class="msbar">
        <input type="text" placeholder="Search India (Cities, Treks...)" onkeyup="searchIndia(this.value)">
    </div>
    <div id="results" class="mres"></div>
    
    <div class="mctrl">
        <div class="mb" onclick="locateMe()">🛰</div>
        <div class="mb" onclick="switchMode('3d')">3D</div>
    </div>

    <div id="map"></div>
    <div id="map3d"></div>
</div>

<div id="authModal">
    <div class="modal-box">
        <h3 id="authTitle" style="color:var(--g); margin-bottom:15px;">Login</h3>
        <input type="email" id="email" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">
        <input type="password" id="pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; background:#000; border:1px solid #333; color:#fff; border-radius:8px;">
        <button onclick="handleAuth()" style="width:100%; padding:10px; background:var(--g); border:none; border-radius:8px; font-weight:700;">Continue</button>
        <p onclick="toggleAuth()" style="font-size:11px; text-align:center; margin-top:10px; color:var(--t3); cursor:pointer;">Switch to Sign Up</p>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (ADD YOURS HERE) ---
    const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "...", storageBucket: "...", messagingSenderId: "...", appId: "..." };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- MAP INITIALIZATION ---
    let map = L.map('map', {zoomControl: false}).setView([20.5, 78.9], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);
    let map3d = null;

    // --- REAL-TIME GPS ---
    function locateMe() {
        map.locate({setView: true, maxZoom: 16, enableHighAccuracy: true});
    }

    // --- INDIA-WIDE SEARCH ---
    async function searchIndia(q) {
        if(q.length < 3) return;
        const res = await fetch(`https://photon.komoot.io/api/?q=${q}&limit=5`);
        const data = await res.json();
        const div = document.getElementById('results');
        div.innerHTML = ''; div.style.display = 'block';
        data.features.forEach(f => {
            const item = document.createElement('div');
            item.className = 'mres-item';
            item.innerHTML = `📍 ${f.properties.name}, ${f.properties.state || ''}`;
            item.onclick = () => {
                map.setView([f.geometry.coordinates[1], f.geometry.coordinates[0]], 14);
                div.style.display = 'none';
            };
            div.appendChild(item);
        });
    }

    // --- LOGIN SYSTEM ---
    let isSignUp = false;
    function openAuth() { document.getElementById('authModal').style.display = 'flex'; }
    function toggleAuth() { isSignUp = !isSignUp; document.getElementById('authTitle').innerText = isSignUp ? "Sign Up" : "Login"; }
    
    async function handleAuth() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('pass').value;
        try {
            if(isSignUp) await auth.createUserWithEmailAndPassword(e, p);
            else await auth.signInWithEmailAndPassword(e, p);
            document.getElementById('authModal').style.display = 'none';
        } catch(err) { alert(err.message); }
    }

    auth.onAuthStateChanged(user => {
        document.getElementById('authBtn').innerText = user ? "👤 Profile" : "🔑 Login";
    });

    // --- SOS SYSTEM (PRIVATE CONTACTS) ---
    async function triggerSOS() {
        if(!auth.currentUser) return alert("Login to send SOS to your private contacts.");
        const snap = await db.collection('users').doc(auth.currentUser.uid).get();
        const contacts = snap.data()?.contacts || [];
        alert(`SOS alert triggered for ${contacts.length} private contacts.`);
    }

    // --- UTILS ---
    function gp(id) {
        document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
        document.getElementById('pg-'+id).classList.add('on');
    }

    function switchMode(mode) {
        const m2 = document.getElementById('map');
        const m3 = document.getElementById('map3d');
        if(mode === '3d') {
            m2.style.display = 'none'; m3.style.display = 'block';
            if(!map3d) map3d = new maplibregl.Map({container:'map3d', style:'https://demotiles.maplibre.org/style.json', center:[78.9, 20.5], zoom:5, pitch:60});
        } else {
            m3.style.display = 'none'; m2.style.display = 'block';
            map.invalidateSize();
        }
    }
</script>
</body>
</html>
