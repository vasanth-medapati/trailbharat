<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TrailBharat</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
header { background:#2c3e50; color:white; padding:15px; text-align:center; }

nav {
  display:flex;
  justify-content:space-around;
  background:#34495e;
}
nav button {
  background:none;
  border:none;
  color:white;
  padding:10px;
  cursor:pointer;
}

section { display:none; padding:20px; }
.active { display:block; }

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
}

#map { height:400px; }

input, select {
  width:100%;
  padding:8px;
  margin:5px 0;
}

#chatBox {
  height:200px;
  overflow-y:auto;
  background:white;
  padding:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<header>TrailBharat - Complete Version</header>

<nav>
<button onclick="showTab('home')">Home</button>
<button onclick="showTab('planner')">AI Planner</button>
<button onclick="showTab('mapTab')">Map</button>
<button onclick="showTab('safety')">Safety</button>
<button onclick="showTab('chat')">Chat</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
<h2>Explore India</h2>
<div id="places"></div>
</section>

<!-- AI -->
<section id="planner">
<h2>AI Trip Planner</h2>
<input id="destination" placeholder="Enter destination">
<select id="days">
<option value="1">1 Day</option>
<option value="3">3 Days</option>
<option value="5">5 Days</option>
</select>
<button onclick="generatePlan()">Generate Plan</button>
<div id="planOutput"></div>
</section>

<!-- MAP -->
<section id="mapTab">
<div id="map"></div>
</section>

<!-- SAFETY -->
<section id="safety">
<h3>Emergency Contacts</h3>

<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<button onclick="addContact()">Add Contact</button>

<div id="contacts"></div>

<button onclick="sendSOS()">🚨 SEND SOS</button>
</section>

<!-- CHAT -->
<section id="chat">
<div id="chatBox"></div>
<input id="chatInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>
</section>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// ================= TAB =================
function showTab(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// ================= PLACES (OLD + EXPANDED) =================
const placesData = [
  {name:"Ahmedabad",desc:"Heritage city",reviews:["Clean","Food is great","Safe"]},
  {name:"Delhi",desc:"Capital city",reviews:["Historic","Crowded","Markets"]},
  {name:"Goa",desc:"Beach paradise",reviews:["Nightlife","Beaches","Fun"]},
  {name:"Kerala",desc:"Backwaters",reviews:["Peaceful","Green","Relaxing"]},
  {name:"Bangalore",desc:"Tech hub",reviews:["Modern","Traffic","Food"]},
  {name:"Hyderabad",desc:"City of pearls",reviews:["Biryani","History","Clean"]}
];

const container = document.getElementById("places");

placesData.forEach(p=>{
  container.innerHTML += `
    <div class="card">
      <h3>${p.name}</h3>
      <p>${p.desc}</p>

      ${p.reviews.map(r=>`<p>⭐ ${r}</p>`).join("")}

      <button onclick="bookHotel('${p.name}')">Book Hotel</button>
    </div>
  `;
});

// ================= HOTEL LINKS =================
function bookHotel(place){
  const q = encodeURIComponent(place);

  window.open(`https://www.makemytrip.com/hotels/${q}-hotels.html`);
  window.open(`https://www.goibibo.com/hotels/find-hotels-in-${q}/`);
  window.open(`https://www.agoda.com/search?text=${q}`);
}

// ================= AI PLANNER (FIXED RANDOMNESS) =================
function generatePlan(){
  const d = document.getElementById("destination").value;
  const days = parseInt(document.getElementById("days").value);

  const activities = [
    "Visit landmarks",
    "Try street food",
    "Explore hidden places",
    "Photography",
    "Cultural visit",
    "Shopping markets"
  ];

  let plan="";
  let used=[];

  for(let i=1;i<=days;i++){
    let act;
    do{
      act = activities[Math.floor(Math.random()*activities.length)];
    } while(used.includes(act));

    used.push(act);
    plan += `<p><b>Day ${i}:</b> ${act} in ${d}</p>`;
  }

  document.getElementById("planOutput").innerHTML = plan;
}

// ================= MAP (SATELLITE + TOPO FIXED) =================
const map = L.map('map').setView([23.0225,72.5714],5);

const street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const topo = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png');

const satellite = L.tileLayer(
'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'
);

L.control.layers({
"Street": street,
"Topographic": topo,
"Satellite": satellite
}).addTo(map);

// ================= CONTACTS =================
let contacts = JSON.parse(localStorage.getItem("contacts")) || [];

function addContact(){
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;

  if(!name || !phone) return alert("Enter details");

  contacts.push({name,phone});
  localStorage.setItem("contacts", JSON.stringify(contacts));

  renderContacts();
}

function renderContacts(){
  document.getElementById("contacts").innerHTML =
    contacts.map(c=>`<p>${c.name} - ${c.phone}</p>`).join("");
}
renderContacts();

// ================= SOS =================
function sendSOS(){
  if(!contacts.length) return alert("No contacts!");

  navigator.geolocation.getCurrentPosition(pos=>{
    const link = `https://maps.google.com/?q=${pos.coords.latitude},${pos.coords.longitude}`;
    alert("SOS sent with location:\n"+link);
  });
}

// ================= CHATBOT (IMPROVED) =================
function sendMessage(){
  const input = document.getElementById("chatInput").value.toLowerCase();
  const box = document.getElementById("chatBox");

  box.innerHTML += `<p><b>You:</b> ${input}</p>`;

  let reply="Explore places in Home tab.";

  if(input.includes("hotel")) reply="Click 'Book Hotel' for options.";
  else if(input.includes("plan")) reply="Use AI Planner tab.";
  else if(input.includes("safe")) reply="Use Safety tab for SOS.";
  else if(input.includes("map")) reply="Check Map tab.";

  box.innerHTML += `<p><b>Bot:</b> ${reply}</p>`;
}

// ================= OFFLINE =================
if("serviceWorker" in navigator){
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([`
    const cacheName='trailbharat';
    self.addEventListener('install',e=>{
      e.waitUntil(
        caches.open(cacheName).then(cache=>cache.addAll(['./']))
      );
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(
        caches.match(e.request).then(res=>res||fetch(e.request))
      );
    });
  `], {type:'text/javascript'})));
}
</script>

</body>
</html>
