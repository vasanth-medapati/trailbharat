<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrailBharat</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Basic Styling -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000;
    }

    header {
      background: #111;
      color: #fff;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #f5f5f5;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 5px;
      background: #000;
      color: #fff;
      cursor: pointer;
    }

    .dark {
      background: #111;
      color: #fff;
    }

    .dark .card {
      border: 1px solid #444;
    }

    #details {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>TrailBharat</h1>
  <button onclick="toggleDarkMode()">🌙 Toggle Mode</button>
</header>

<div class="container">

  <h2>Explore Places</h2>

  <div class="card" onclick="showDetails('Delhi')">
    Delhi
  </div>

  <div class="card" onclick="showDetails('Ahmedabad')">
    Ahmedabad
  </div>

  <div class="card" onclick="showDetails('Hyderabad')">
    Hyderabad
  </div>

  <h2>Your Location</h2>
  <button onclick="getLocation()">Get Location</button>
  <p id="location"></p>

  <h2>Weather</h2>
  <button onclick="getWeather()">Get Weather</button>
  <p id="weather"></p>

  <div id="details"></div>

</div>

<script src="js/app.js"></script>

</body>
</html>
