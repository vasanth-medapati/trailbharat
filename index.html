<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrailBharat</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>TrailBharat</h1>
  <button onclick="toggleDarkMode()">🌙</button>
</header>

<div class="container">

  <h2>Explore Places</h2>

  <div class="card" onclick="showDetails('Delhi')">Delhi</div>
  <div class="card" onclick="showDetails('Ahmedabad')">Ahmedabad</div>
  <div class="card" onclick="showDetails('Hyderabad')">Hyderabad</div>

  <h2>Live Location</h2>
  <button onclick="getLocation()">Get Location</button>
  <p id="location"></p>

  <h2>Weather</h2>
  <button onclick="getWeather()">Check Weather</button>
  <p id="weather"></p>

  <div id="details"></div>

</div>

<script src="app.js"></script>

</body>
</html>
