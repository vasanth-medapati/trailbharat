<nav>
  <div class="nb">🏔 TB</div>
  <div class="ntabs">
    <button class="nt on" onclick="gp('home')">🏠 Home</button>
    <button class="nt" id="btn2d" onclick="gp('map'); switchMode('2d')">🗺 2D Map</button>
    <button class="nt" id="btn3d" onclick="gp('map'); switchMode('3d')">🏔 3D View</button>
    <button class="nt" onclick="gp('safety')">🛡 Safety</button>
    <button class="nt" onclick="openUserModal()">👤 Profile</button>
  </div>
  <button class="nsos" onclick="triggerSOS()">🆘 SOS</button>
</nav>

<div id="pg-map" class="pg">
    <div class="msbar">
        <input id="mapSearch" type="text" placeholder="Search places, trails, cities..." onkeyup="enhancedSearch(this.value)">
        <div id="searchSuggestions" class="mres"></div>
    </div>
    
    <div class="mctrl">
        <div class="mb" onclick="startNavigation()" title="Start Nav">🚀</div>
        <div class="mb" onclick="toggleSafetyLayers()" title="Toggle Risk Zones">⚠️</div>
        <div class="mb" onclick="switchMode('3d')">3D</div>
    </div>

    <div id="map"></div>
    <div id="map3d"></div>

    <div id="navInstructions" style="position:absolute; bottom:80px; left:10px; right:10px; background:var(--bg2); display:none; padding:15px; border-radius:12px; z-index:2000;">
        <span id="navText">Proceed to Trailhead...</span>
    </div>
</div>

<script>
/* ============================================================
   1. USER DATA & SOS SYSTEM (Individual Contacts)
   ============================================================ */
let userData = JSON.parse(localStorage.getItem('tb_user')) || {
    name: "Explorer",
    contacts: [], // Array of {name, phone}
    favPlaces: []
};

function saveUser() { localStorage.setItem('tb_user', JSON.stringify(userData)); }

function triggerSOS() {
    if (userData.contacts.length === 0) {
        alert("Please add Emergency Contacts in your Profile first!");
        return gp('home');
    }
    
    navigator.geolocation.getCurrentPosition(pos => {
        const link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        const msg = `EMERGENCY! I need help. My live location: ${link}`;
        
        // In a real app, this calls a backend SMS API. 
        // For now, it alerts the specific targets.
        userData.contacts.forEach(c => {
            console.log(`Sending individual SOS to ${c.name} (${c.phone}): ${msg}`);
        });
        alert(`SOS Sent to ${userData.contacts.length} contacts!`);
    });
}

/* ============================================================
   2. ENHANCED SEARCH (Google Maps Style)
   ============================================================ */
async function enhancedSearch(query) {
    if (query.length < 3) return;
    const res = await fetch(`https://photon.komoot.io/api/?q=${query}&limit=5`);
    const data = await res.json();
    
    const box = document.getElementById('searchSuggestions');
    box.innerHTML = '';
    box.style.display = 'block';
    
    data.features.forEach(f => {
        const div = document.createElement('div');
        div.className = 'mres-item';
        div.innerHTML = `📍 ${f.properties.name} <small>${f.properties.city || ''}</small>`;
        div.onclick = () => {
            const coords = f.geometry.coordinates;
            map.setView([coords[1], coords[0]], 15);
            box.style.display = 'none';
        };
        box.appendChild(div);
    });
}

/* ============================================================
   3. FAST GPS & LIVE TRACKING
   ============================================================ */
let userMarker;
function initLiveTracking() {
    navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude, heading } = pos.coords;
        const latlng = [latitude, longitude];

        if (!userMarker) {
            userMarker = L.marker(latlng).addTo(map);
        } else {
            userMarker.setLatLng(latlng);
        }
        
        // If 3D mode is on, sync camera
        if (map3d) {
            map3d.jumpTo({ center: [longitude, latitude], bearing: heading || 0 });
        }
        
        document.getElementById('mgpst').innerText = `Live: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
    }, err => console.error(err), { enableHighAccuracy: true, maximumAge: 1000 });
}

/* ============================================================
   4. SAFETY SYSTEM (Accident & Natural Risks)
   ============================================================ */
const riskZones = [
    { name: "Landslide Prone Area", coords: [23.1, 72.6], radius: 1000, type: "natural" },
    { name: "Black Spot - High Accidents", coords: [23.05, 72.58], radius: 500, type: "accident" }
];

function toggleSafetyLayers() {
    riskZones.forEach(zone => {
        L.circle(zone.coords, {
            color: zone.type === 'natural' ? 'orange' : 'red',
            fillColor: zone.type === 'natural' ? '#ffa500' : '#f03',
            fillOpacity: 0.5,
            radius: zone.radius
        }).addTo(map).bindPopup(`<b>WARNING: ${zone.name}</b>`);
    });
    alert("Risk Zones & Accident Prone Areas loaded on map.");
}

/* ============================================================
   5. REAL NAVIGATION LOGIC
   ============================================================ */
async function getRoute(start, end) {
    const url = `https://router.project-osrm.org/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;
    const res = await fetch(url);
    const data = await res.json();
    
    if (data.routes.length > 0) {
        L.geoJSON(data.routes[0].geometry, { style: { color: '#4ade80', weight: 6 } }).addTo(map);
        document.getElementById('navInstructions').style.display = 'block';
        document.getElementById('navText').innerText = `Distance: ${(data.routes[0].distance / 1000).toFixed(2)} km`;
    }
}

/* ============================================================
   6. 3D MAP & MODES
   ============================================================ */
let map3d = null;
function switchMode(mode) {
    const m2 = document.getElementById('map');
    const m3 = document.getElementById('map3d');
    if (mode === '3d') {
        m2.style.display = 'none'; m3.style.display = 'block';
        if (!map3d) {
            map3d = new maplibregl.Map({
                container: 'map3d',
                style: 'https://demotiles.maplibre.org/style.json',
                center: [72.5714, 23.0225], zoom: 14, pitch: 70
            });
            map3d.addControl(new maplibregl.NavigationControl());
        }
    } else {
        m3.style.display = 'none'; m2.style.display = 'block';
        map.invalidateSize();
    }
}

// Initialize
window.onload = () => {
    initLiveTracking();
    // Load your favorite places/contacts UI logic here
};
</script>
